name: LurieCommitteeHub
options:
  bundleIdPrefix: com.luriechildrens
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    INFOPLIST_FILE: LurieCommitteeHub/Info.plist

targets:
  LurieCommitteeHub:
    type: application
    platform: iOS
    sources:
      - path: LurieCommitteeHub
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.luriechildrens.committeehub
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: true
        SUPPORTS_MACCATALYST: false
    entitlements:
      path: LurieCommitteeHub/LurieCommitteeHub.entitlements
    info:
      path: LurieCommitteeHub/Info.plist
